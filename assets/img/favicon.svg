<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Gradiente do fundo -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1f"/>
      <stop offset="100%" stop-color="#12102a"/>
    </linearGradient>
    <!-- Gradiente das barras do gráfico -->
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <!-- Gradiente do haltere -->
    <linearGradient id="dumbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <!-- Filtro de brilho suave nas barras -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="64" height="64" rx="12" fill="url(#bgGrad)"/>

  <!-- === Gráfico de barras crescentes (fundo) === -->
  <!-- Linha de base -->
  <line x1="8" y1="52" x2="56" y2="52" stroke="#4f46e5" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Barra 1 (mais curta) -->
  <rect x="9" y="44" width="7" height="8" rx="1.5" fill="url(#barGrad)" opacity="0.55" filter="url(#glow)"/>
  <!-- Barra 2 -->
  <rect x="19" y="38" width="7" height="14" rx="1.5" fill="url(#barGrad)" opacity="0.65" filter="url(#glow)"/>
  <!-- Barra 3 -->
  <rect x="29" y="30" width="7" height="22" rx="1.5" fill="url(#barGrad)" opacity="0.75" filter="url(#glow)"/>
  <!-- Barra 4 (mais alta) -->
  <rect x="39" y="20" width="7" height="32" rx="1.5" fill="url(#barGrad)" opacity="0.9" filter="url(#glow)"/>
  <!-- Pontinho no topo indicando tendência -->
  <circle cx="42.5" cy="18" r="1.8" fill="#a855f7" opacity="0.9"/>
  <!-- Linha de tendência -->
  <polyline points="12.5,44 22.5,37 32.5,29 42.5,18"
    fill="none" stroke="#818cf8" stroke-width="1.2"
    stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="2,2" opacity="0.7"/>

  <!-- === Haltere (frente) === -->
  <!-- Cabo central -->
  <rect x="22" y="30" width="20" height="4" rx="2" fill="url(#dumbGrad)"/>

  <!-- Peso esquerda - placa externa -->
  <rect x="12" y="26" width="5" height="12" rx="2.5" fill="url(#dumbGrad)" opacity="0.9"/>
  <!-- Peso esquerda - placa interna -->
  <rect x="17" y="27.5" width="5" height="9" rx="2" fill="url(#dumbGrad)"/>

  <!-- Peso direita - placa interna -->
  <rect x="42" y="27.5" width="5" height="9" rx="2" fill="url(#dumbGrad)"/>
  <!-- Peso direita - placa externa -->
  <rect x="47" y="26" width="5" height="12" rx="2.5" fill="url(#dumbGrad)" opacity="0.9"/>
</svg>
